<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | SupCrud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200">
        <div class="text-center mb-10">
            <div class="inline-flex bg-indigo-100 p-4 rounded-3xl text-indigo-600 mb-6">
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900">Bienvenido de nuevo</h1>
            <p class="text-slate-500 mt-2 font-medium">SupCrud by Crudzaso</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="usuario@ejemplo.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
                <input type="password" id="password" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
                Entrar al Sistema
            </button>
        </form>

        <div class="relative my-8 text-center">
            <span class="bg-white px-4 text-slate-400 text-sm font-medium relative z-10">o continúa con</span>
            <div class="absolute top-1/2 left-0 w-full h-px bg-slate-100"></div>
        </div>

        <button class="w-full bg-white border border-slate-200 text-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
            Google Workspace
        </button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/auth.js"></script>
    <script src="js/pages/loginPage.js"></script>
</body>
</html>
